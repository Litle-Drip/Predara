<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Settlement Desk — Predara</title>
  <meta name="description" content="AI-powered settlement auditing for Gemini prediction markets.">
  <link rel="icon" href="/og-image.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f0f11;
      --card:        #18181c;
      --border:      #27272e;
      --border-hi:   #3a3a42;
      --text:        #b4b4c0;
      --text-mid:    #d0d0da;
      --text-bright: #ededf2;
      --muted:       #6b6b7a;
      --orange:      #d94f20;
      --orange-dim:  rgba(217,79,32,0.12);
      --orange-bg:   rgba(217,79,32,0.08);
      --bar-bg:      #222228;
      --shadow:      0 1px 2px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.25);
      --shadow-sm:   0 1px 3px rgba(0,0,0,0.3);
      --rec-bg:      rgba(255,255,255,0.03);
      --confirmed-pill-bg:    #0f8a5e; --confirmed-pill-text:    #e2f7ee;
      --discrepancy-pill-bg:  #c73a2f; --discrepancy-pill-text:  #fceceb;
      --needs-pill-bg:        #a37012; --needs-pill-text:        #fdf3dc;
      --error-pill-bg:        #333;    --error-pill-text:        #aaa;
    }

    body.light {
      --bg:          #f7f7f5;
      --card:        #ffffff;
      --border:      #e6e6e4;
      --border-hi:   #d0d0ce;
      --text:        #4a4a52;
      --text-mid:    #2e2e38;
      --text-bright: #16161a;
      --muted:       #8e8e9a;
      --orange:      #c8421a;
      --orange-dim:  rgba(200,66,26,0.1);
      --orange-bg:   rgba(200,66,26,0.06);
      --bar-bg:      #eeeeed;
      --shadow:      0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
      --shadow-sm:   0 1px 2px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.04);
      --rec-bg:      rgba(0,0,0,0.03);
      --error-pill-bg: #ddd; --error-pill-text: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 20px 72px;
    }

    /* ── Header ── */
    .app-header {
      display: flex;
      align-items: center;
      margin-bottom: 36px;
      position: relative;
    }

    .logo-link {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      flex-shrink: 0;
    }

    .app-logo {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .app-logo img { width: 100%; height: 100%; object-fit: contain; display: block; }

    .app-title {
      font-size: 19px;
      font-weight: 600;
      color: var(--text-bright);
      letter-spacing: -0.4px;
    }

    .app-subtitle {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.2px;
      margin-top: 2px;
    }

    /* ── Tab nav — absolutely centered ── */
    .tab-nav {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 3px;
      background: var(--bar-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }

    .tab-nav a {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      padding: 5px 11px;
      border-radius: 5px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .tab-nav a:hover { color: var(--text-bright); background: rgba(128,128,128,0.12); }
    .tab-nav a.active { background: var(--orange); color: #fff; }

    /* ── Theme toggle ── */
    .theme-toggle {
      margin-left: auto;
      background: var(--bar-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 6px 9px;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .theme-toggle:hover { color: var(--text-bright); border-color: var(--border-hi); }

    /* ── Intake panel ── */
    .intake {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 24px;
      margin-bottom: 28px;
      box-shadow: var(--shadow-sm);
    }

    .intake-label {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .intake-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 16px;
    }

    .intake-row { display: flex; gap: 8px; }

    .intake-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text-bright);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      min-width: 0;
    }

    .intake-row input::placeholder { color: var(--muted); }

    .intake-row input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px var(--orange-dim);
    }

    .btn-review {
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      flex-shrink: 0;
      letter-spacing: 0.2px;
    }

    .btn-review:hover { opacity: 0.88; }
    .btn-review:disabled { opacity: 0.4; cursor: not-allowed; }

    .shortcut-hint { font-size: 11px; color: var(--muted); margin-top: 8px; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 56px 0; color: var(--muted); font-size: 14px; }
    .empty-state-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }
    .empty-state-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }

    /* ── Case cards ── */
    .case-list { display: flex; flex-direction: column; gap: 10px; }

    .case-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.15s;
    }

    .case-card:hover { border-color: var(--border-hi); }
    .case-card.verdict-confirmed   { border-left: 3px solid var(--confirmed-pill-bg); }
    .case-card.verdict-discrepancy { border-left: 3px solid var(--discrepancy-pill-bg); }
    .case-card.verdict-needs_review { border-left: 3px solid var(--needs-pill-bg); }
    .case-card.verdict-error       { border-left: 3px solid var(--border-hi); }
    .case-card.verdict-pending     { border-left: 3px solid var(--orange); }

    .case-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }

    .case-header:hover { background: rgba(128,128,128,0.04); }

    .case-meta { flex: 1; min-width: 0; }

    .case-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }

    .case-ticker {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--orange);
      background: var(--orange-bg);
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .case-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-bright);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .verdict-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 20px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .pill-confirmed    { background: var(--confirmed-pill-bg);   color: var(--confirmed-pill-text); }
    .pill-discrepancy  { background: var(--discrepancy-pill-bg); color: var(--discrepancy-pill-text); }
    .pill-needs_review { background: var(--needs-pill-bg);       color: var(--needs-pill-text); }
    .pill-error        { background: var(--error-pill-bg);       color: var(--error-pill-text); }
    .pill-pending {
      background: var(--orange-dim);
      color: var(--orange);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .case-summary { font-size: 13px; color: var(--text); line-height: 1.45; margin-top: 2px; }
    .case-timestamp { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .case-chevron { font-size: 13px; color: var(--muted); flex-shrink: 0; transition: transform 0.2s; margin-top: 2px; }
    .case-card.expanded .case-chevron { transform: rotate(180deg); }

    .case-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
    .case-card.expanded .case-body { display: block; }

    .case-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin: 14px 0 6px;
    }

    .key-facts { list-style: none; display: flex; flex-direction: column; gap: 5px; }

    .key-facts li {
      font-size: 13px;
      color: var(--text-mid);
      padding-left: 14px;
      position: relative;
      line-height: 1.4;
    }

    .key-facts li::before {
      content: "·";
      position: absolute;
      left: 0;
      color: var(--orange);
      font-size: 16px;
      line-height: 1;
      top: 1px;
    }

    .recommendation {
      font-size: 13px;
      color: var(--text-mid);
      line-height: 1.45;
      background: var(--rec-bg);
      border-radius: 6px;
      padding: 10px 12px;
    }

    .case-footer { display: flex; justify-content: flex-end; margin-top: 14px; }

    .btn-remove {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      font-family: inherit;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-remove:hover { border-color: var(--discrepancy-pill-bg); color: #f87171; }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--orange-dim);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 560px) {
      .app { padding: 18px 14px 56px; }
      .app-header { margin-bottom: 22px; }
      .tab-nav { display: none; }
      .intake-row { flex-direction: column; }
      .btn-review { width: 100%; }
      .shortcut-hint { display: none; }
      .case-title { font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="app">

  <div class="app-header">
    <a class="logo-link" href="/" title="Back to Analyze">
      <div class="app-logo"><img src="/og-image.png" alt="Predara logo"></div>
      <div>
        <div class="app-title">Predara</div>
        <div class="app-subtitle">Prediction market analyzer</div>
      </div>
    </a>
    <nav class="tab-nav" aria-label="App sections">
      <a href="/">Analyze</a>
      <a href="/settlement.html" class="active">Settlement Desk</a>
    </nav>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">☀</button>
  </div>

  <div class="intake">
    <div class="intake-label">Settlement Desk</div>
    <div class="intake-desc">After a market closes, paste the Gemini ticker or URL and AI will cross-check the outcome against real-world results — confirming correct settlements or flagging discrepancies.</div>
    <div class="intake-row">
      <input
        id="tickerInput"
        type="text"
        placeholder="Paste ticker, instrument symbol, or Gemini URL…"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        onkeydown="if(event.key==='Enter')submitReview()"
      />
      <button class="btn-review" id="reviewBtn" onclick="submitReview()">Review ↗</button>
    </div>
    <div class="shortcut-hint">Press Enter to submit</div>
  </div>

  <div id="caseList" class="case-list"></div>

</div>

<script>
  /* ── Theme ── */
  ;(function() {
    const saved = localStorage.getItem('predara-theme')
    if (saved === 'light') document.body.classList.add('light')
  })()

  function toggleTheme() {
    const isLight = document.body.classList.toggle('light')
    localStorage.setItem('predara-theme', isLight ? 'light' : 'dark')
    document.getElementById('themeToggle').textContent = isLight ? '☽' : '☀'
  }

  ;(function() {
    if (localStorage.getItem('predara-theme') === 'light') {
      const btn = document.getElementById('themeToggle')
      if (btn) btn.textContent = '☽'
    }
  })()

  const STORAGE_KEY = "predara-settlement-cases"

  /* ── Storage ── */
  function loadCases() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]") } catch { return [] }
  }

  function saveCases(cases) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(cases)) } catch {}
  }

  /* ── Render helpers ── */
  function verdictLabel(v) {
    return { confirmed: "Confirmed", discrepancy: "Discrepancy", needs_review: "Needs Review", error: "Error", pending: "Reviewing…" }[v] || v
  }

  function pillClass(v) {
    return "verdict-pill pill-" + (v || "error")
  }

  function formatTs(ts) {
    try {
      return new Date(ts).toLocaleString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })
    } catch { return "" }
  }

  function renderCard(c) {
    const isPending = c.verdict === "pending"
    const card = document.createElement("div")
    card.className = "case-card verdict-" + (c.verdict || "error")
    card.dataset.id = c.id

    const tickerLabel = c.ticker || c.input || "—"
    const title = (!isPending && c.title && c.title !== tickerLabel) ? c.title : ""
    const summary = isPending
      ? '<span class="spinner"></span>Sending to AI for analysis…'
      : esc(c.summary || "")

    const topRow = `
      <span class="case-ticker">${esc(tickerLabel)}</span>
      ${title ? `<span class="case-title">${esc(title)}</span>` : ""}
      <span class="${pillClass(c.verdict)}">${isPending ? '<span class="spinner"></span>' : ""}${esc(verdictLabel(c.verdict))}</span>
    `

    // Remove button always available on every card (pending or resolved)
    const removeBtn = `<button class="btn-remove" onclick="removeCase('${c.id}', event)" style="margin-top:${isPending ? "10px" : "0"}">Remove</button>`

    let bodyHtml = ""
    if (isPending) {
      bodyHtml = `<div style="padding:0 16px 12px;display:flex;justify-content:flex-end">${removeBtn}</div>`
    } else {
      const facts = Array.isArray(c.keyFacts) ? c.keyFacts : []
      const factItems = facts.map(f => `<li>${esc(f)}</li>`).join("")
      bodyHtml = `
        <div class="case-body">
          ${facts.length ? `<div class="case-section-label">Key Facts</div><ul class="key-facts">${factItems}</ul>` : ""}
          ${c.recommendation ? `<div class="case-section-label">Recommendation</div><div class="recommendation">${esc(c.recommendation)}</div>` : ""}
          <div class="case-footer">${removeBtn}</div>
        </div>
      `
    }

    card.innerHTML = `
      <div class="case-header" onclick="${isPending ? "" : "toggleCard(this)"}">
        <div class="case-meta">
          <div class="case-top">${topRow}</div>
          <div class="case-summary">${summary}</div>
          <div class="case-timestamp">${formatTs(c.ts)}</div>
        </div>
        ${!isPending ? '<div class="case-chevron">▾</div>' : ""}
      </div>
      ${bodyHtml}
    `
    return card
  }

  function esc(s) {
    return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;")
  }

  function toggleCard(headerEl) {
    const card = headerEl.closest(".case-card")
    if (card) card.classList.toggle("expanded")
  }

  /* ── Empty state ── */
  function renderEmptyState() {
    const el = document.createElement("div")
    el.className = "empty-state"
    el.innerHTML = `
      <div class="empty-state-icon">🔍</div>
      <div class="empty-state-title">No cases yet</div>
      <div>Paste a Gemini ticker or market URL above to audit its settlement.</div>
    `
    return el
  }

  /* ── Full re-render from storage ── */
  function renderAll() {
    const cases = loadCases()
    const list = document.getElementById("caseList")
    list.innerHTML = ""
    if (cases.length === 0) {
      list.appendChild(renderEmptyState())
      return
    }
    // Storage is newest-first (unshift on insert) — append preserves that order
    cases.forEach(c => list.appendChild(renderCard(c)))
  }

  const PENDING_TIMEOUT_MS = 25000  // abort fetch after 25 s
  const STALE_PENDING_MS = 120000  // cases stuck pending >2 min at boot → error

  /* ── Submit ── */
  async function submitReview() {
    const input = document.getElementById("tickerInput").value.trim()
    if (!input) { document.getElementById("tickerInput").focus(); return }

    const btn = document.getElementById("reviewBtn")
    btn.disabled = true
    document.getElementById("tickerInput").value = ""

    const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 7)
    const ts = new Date().toISOString()
    const pendingCase = { id, input, ticker: input, title: "", verdict: "pending", summary: "", keyFacts: [], recommendation: "", ts }

    // Persist pending card and render immediately (newest-first via unshift)
    const cases = loadCases()
    cases.unshift(pendingCase)
    saveCases(cases)
    renderAll()

    const controller = new AbortController()
    const timer = setTimeout(() => controller.abort(), PENDING_TIMEOUT_MS)

    function resolveCase(update) {
      clearTimeout(timer)
      const stored = loadCases()
      const idx = stored.findIndex(c => c.id === id)
      if (idx !== -1) { stored[idx] = { id, input, ts, ...update }; saveCases(stored) }
      renderAll()
      btn.disabled = false
    }

    try {
      const res = await fetch("/api/settlement-review", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ input }),
        signal: controller.signal,
      })
      const data = await res.json()
      resolveCase({
        ticker:         data.ticker || input,
        title:          data.title || "",
        verdict:        data.verdict || "error",
        summary:        data.summary || "No summary returned.",
        keyFacts:       Array.isArray(data.keyFacts) ? data.keyFacts : [],
        recommendation: data.recommendation || "",
      })
    } catch (err) {
      const timedOut = err.name === "AbortError"
      resolveCase({
        ticker: input, title: "", verdict: "error",
        summary: timedOut ? "Request timed out. The AI may be slow — please try again." : "Request failed: " + (err.message || "network error"),
        keyFacts: [], recommendation: "",
      })
    }
  }

  /* ── Remove ── */
  function removeCase(id, event) {
    event.stopPropagation()
    const cases = loadCases().filter(c => c.id !== id)
    saveCases(cases)
    renderAll()
  }

  /* ── Boot: sweep stale pending cases ── */
  function sweepStalePending() {
    const now = Date.now()
    const cases = loadCases()
    let changed = false
    cases.forEach(c => {
      if (c.verdict === "pending" && (now - new Date(c.ts).getTime()) > STALE_PENDING_MS) {
        c.verdict = "error"
        c.summary = "Review did not complete (page was closed or refreshed mid-request). Re-submit to try again."
        c.keyFacts = []
        c.recommendation = ""
        changed = true
      }
    })
    if (changed) saveCases(cases)
  }

  sweepStalePending()
  renderAll()
</script>
</body>
</html>
